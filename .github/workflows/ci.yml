name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild FlowNode.sln /t:Restore /p:Configuration=Release

      - name: Build
        run: msbuild FlowNode.sln /t:Build /p:Configuration=Release /p:RestorePackages=false

      - name: Generate samples
        run: powershell -ExecutionPolicy Bypass -File scripts/generate-samples.ps1

      - name: Run Core tests
        run: .\FlowNode.Tests\bin\Release\net472\FlowNode.Tests.exe

      - name: Run Editor tests
        run: .\FlowNode.Tests.Editor\bin\Release\net472\FlowNode.Tests.Editor.exe

      - name: Run CLI sample graph
        run: .\FlowNode.Cli\bin\Release\net472\FlowNode.Cli.exe samples\print-hello.xml

      - name: Run score-check business sample
        run: .\FlowNode.Cli\bin\Release\net472\FlowNode.Cli.exe --var threshold=60 samples\score-check.xml

      - name: Run config-score-check JSON sample
        run: .\FlowNode.Cli\bin\Release\net472\FlowNode.Cli.exe samples\config-score-check.xml

      - name: Run webhook-post sample
        run: .\FlowNode.Cli\bin\Release\net472\FlowNode.Cli.exe samples\webhook-post.xml

      - name: Run HostDemo embed sample
        run: .\FlowNode.HostDemo\bin\Release\net472\FlowNode.HostDemo.exe
